    {
        name = "loopwhile-thd",
        comment = """
loopwhile-thd is like loopwhile but the thread runs in its own thread asynchronously. The form of a loopwhile-thd is (loopwhile-thd stack cond body) . A While-loop that starts in a new thread. The argument stack is the stack-size of the thread, cond is the condition that has the be true for the loop to continue running and body is the code to execute each iteration. The difference from the regular loopwhile is that the evaluator will continue running the code after this one before this one finishes, as this loop is evaluated in a new thread. The following examples assumes that your LispBM integration has a way to print . Example that forever prints "Hello World" every two seconds: (loopwhile-thd 100 t { (print "Hello World") (sleep 2) }) The above is equivalent to the following code (spawn 100 (fn () (loopwhile t { (print "Hello World") (sleep 2) }))) It is possible to give the thread a name and/or a stack size. That gives the following combinations of possibilities: No name and default stack size (loopwhile-thd () t { (print "Hello World1") (sleep 2) }) No name and stack size 100 (loopwhile-thd 100 t { (print "Hello World2") (sleep 2) }) Name ThdTest and default stack size (loopwhile-thd "ThdTest" t { (print "Hello World3" ) (sleep 2) }) Name ThdTest2 and stack size 100 (loopwhile-thd ("ThdTest2" 100) t { (print "Hello World4") (sleep 2) })
