definitions = [
    {
        name = "ble-start-app",
        comment = """
(ble-start-app) This starts the BLE server with the configured name, allowing other devices to connect and you to create services. This should be called once at the start of the program. It has no effect on subsequent calls (currently, the only way to stop the BLE server is to power cycle the VESC). It returns true the first time it is called and nil on subsequent calls. This function may throw an eval_error if some previous internal mechanism has failed.
"""
    },
    {
        name = "ble-set-name",
        comment = """
(ble-set-name name) Configure the name that the BLE server advertises as the device's name. So essentially, the devices name in the BLE system. The name must not be longer than 30 characters. Providing a longer name will throw an eval_error . In practice the limit is probably much shorter, since the name is placed in a advertising packet together with other data which has a limit of 31 bytes in total. (TODO: The precise mechanics of this need to be figured out.) This should be called before the BLE server has started (so before is called). Then true is returned. Calling it afterwards has no effect and returns nil .
"""
    },
    {
        name = "ble-conf-adv-set-channels",
        comment = """
(ble-conf-adv-set-channels channels) Configure channels to use for advertising. Channels is a list and must contain a combination of 37, 38 and 39. By default all channels are used. Example: ; Use all channels for advertising (ble-conf-adv-set-channels '(37 38 39))
"""
    },
    {
        name = "ble-conf-adv-set-interval",
        comment = """
(ble-conf-adv-set-interval min max) Configure minimum and maximum advertising interval in units of 0.625 ms. Both intervals (min and max) must be within 0x0020 and 0x4000 (20 ms to 10.24 s). Example: (ble-conf-adv-set-interval 0x400 0x800)
"""
    },
    {
        name = "ble-conf-adv",
        comment = """
(ble-conf-adv false) (ble-conf-adv use-custom adv-data scan-rsp-data) Configure if custom advertising data should be used, and which packets to send in that case. use-custom is a bool which if true specifies that the custom advertising and scan response packets should be used. If false, adv-data and scan-rsp-data are ignored and do not need to be provided, since a standard packet is used instead (see the example below to see its contents). adv-data and scan-rsp-data are used to specify the packets that are used with advertising and scan responses. They can either be an array which specifies the raw bytes to be sent as the packet, or a list with cons cells of the form (name-symbol-or-number . array) (Must be an integer from 1 to 255 inclusive if a number, see BLE Advertising for valid symbols and other details). If the resulting packet is longer than 31 bytes an eval_error is thrown. You can pass nil to either to specify that it should not be updated and that the previously configured packet should remain in effect (both custom packets are initialized to be an empty array before configuring them with ble-conf-adv ). This extension returns nil in the case of an unknown error occuring related to the internal BLE APIs. Otherwise true is returned. This extension can be called before or after the BLE server has been started with , so at any time. Calling it after the BLE server has been started will cause advertising to restart automatically. This function takes raw or almost completely raw packets, so you should read the section about BLE Advertising if you're unsure about BLE internals. Example that disables custom advertising and scan response packets: (ble-conf-adv false) Example that sets an advertising packet configuring the name "test" and some flags. It also configures an empty scan-response by leaving it unchanged. (def adv-data `( (flags . [0x06]) (name-complete . ,(buf-resize "my-device" -1)) ; We shrink it to not include the terminating null byte. )) (ble-conf-adv true adv-data nil) > t The following example configures packets that are identical to the ones sent by default (assuming that you'd configured the device name to be "test"). (def adv-data `( (flags . [0x06]) (name-complete . [0x74 0x65 0x73 0x74]) ; "test" in ascii (conn-interval-range . [0x06 0x00 0x03 0x00]) )) (def scan-rsp-data `( (flags . [0x06]) (tx-power-level . [0x12]) (conn-interval-range . [0x06 0x00 0x03 0x00]) )) (ble-conf-adv true adv-data scan-rsp-data) Example that configures the same default packets using raw byte-arrays instead: (def adv-data [ 0x02 0x01 0x06 ; flags 0x05 0x09 0x74 0x65 0x73 0x74 ; name-complete 0x05 0x12 0x06 0x00 0x30 0x00 ; conn-interval-range ]) (def scan-rsp-data [ 0x02 0x01 0x06 ; flags 0x02 0x0A 0x12 ; tx-power-level 0x05 0x12 0x06 0x00 0x30 0x00 ; conn-interval-range ]) (ble-conf-adv true adv-data scan-rsp-data)
"""
    },
    {
        name = "ble-remove-service",
        comment = """
(ble-remove-service service-handle) Remove the given service, along with the associated characteristics and descriptors, freeing the resources in the process. service-handle should be a number which was the first number in the list of handles returned by . Due to technical limitations (that should probably be possible to remove), services need to be removed in the reverse order they were created in. Say you created two services, Service A and then Service B , in that order. To remove them, you would have to first remove Service B , followed by Service A . This is because the services are stored on a stack internally, so you need to pop them in the order you usually would with a stack. Example which remove the service with the handle 40, which was the service which was created last: (ble-remove-service 40) > t
"""
    },
    {
        name = "",
        comment = """
(ble-attr-get-value attr-handle) Get the current value of a characteristic or descriptor (referred to generally as an attribute) as a byte array. attr-handle should be a number returned by . Providing an invalid handle will throw an eval_error . Example where the value of the attribute with the handle 42 is set to the byte-array "hello" , and then queried: (ble-attr-set-value 40 "hello") (ble-attr-get-value 40) > "hello"
"""
    },
    {
        name = "ble-attr-set-value",
        comment = """
(ble-attr-set-value attr-handle value) Set the value of the attribute to the provided value. attr-handle should be a number that was returned by and value a byte array. Note that the raw byte without modification will be stored, and since strings are null terminated in LBM, setting the value to a string literal will include the terminating null byte. You will have to create a copy of the byte array without the final byte to avoid this behavior. Here is an example function that does this using : (defun trim-null-byte (str) { (var len (str-len str)) (var cpy (bufcreate len)) (bufcpy cpy 0 str 0 len) cpy }) Providing an invalid handle will throw an eval_error . Setting the value of a characteristic automatically sends notifications or indications to subscribing clients if those flags were set when the characteristic was defined. Example that sets the value of the attribute with the handle 40 to "hello": (ble-attr-set-value 40 "hello") ; it now contains the bytes [0x68 0x65 0x6c 0x6c 0x6f 0x0]
"""
    },
    {
        name = "ble-get-services",
        comment = """
(ble-get-services) Get the list of the handles of the currently active services, excluding any services that have already been removed. The handles are returned in the order they were created in. If you want to remove them, you would need to reverse the list first! Example that gets the currently active service handles: (ble-get-services) > (40u) In this case, only a single service had been created.
"""
    },
    {
        name = "ble-get-attrs",
        comment = """
(ble-get-attrs service-handle) Get the list of characteristic and descriptor handles assigned to the given service when it was created. service-handle should be a number that was returned by . Providing an invalid handle throws an eval_error . This function essentially returns the same list returned when ble-add-service was first called, just without the first item (since that item would correspond to the service's handle). Example where the attribute handles of the service 40 are queried: (ble-get-attrs 40) > (42u 43u) In this case, the service was defined with a single characteristic with a descriptor that had the handles 42 and 43 respectively.
"""
    }
]
