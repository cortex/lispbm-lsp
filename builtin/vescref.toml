    {
        name = "str-find",
        comment = """
(str-find str substr [start] [occurrence] [direction]) Finds the index of the first character of a substring substr in the string str , returning this index, or -1 if it doesn't exist. substr can also be a list of strings, in which case a certain positon only needs to be equal to one of these substrings to be considered a match. If this list is empty, -1 is always returned, and searching for an empty string returns the starting index. Optional arguments: It is valid if the resulting start index is outside the range of str (i.e. being smaller than 0 or larger than the size of str ), in which case the expected behaviour is performed by either immediatly returning no match ( -1 ) or skipping the index forward to the first potentially valid match (depending on the direction). Note about byte arrays str is actually considered to be a byte array, meaning that the final terminating null byte is considered when searching. The final byte of substr is on the other hand removed before it is searched for. If you want to search for an abitrary byte sequence you must first increase the size of substr by one, for instance with (buf-resize substr 1 'copy) . Note however that since specifying start to be -1 starts the search at the last character (which is the second to last byte in a null-terminated string), it is impossible to specify that the search should start at the last byte ! (If you need that functionality, you'll unfortunately need to implement that yourself and only specify positive values for start .) This function actually replaces buf-find which existed in earlier versions of v6.05. This version is almost backwards compatible, so you should be able to just search and replace buf-find with str-find for most cases. The only change is that the third argument occurrence has been moved to the fourth position (with start taking the third). So you'll need to replace (buf-find buf seq x) with (str-find buf seq 0 x) in this case. Examples: (str-find "-str-" "str") > 1 (str-find "-str-str-" "str" 0 1) > 5 (str-find "-str-str-" "str" 2) > 5 (str-find "-str-str-" "str" 'left) > 5 (str-find "-ab-ab-" "ab" 5 'left) > 4 (str-find "-ab-ba-" '("ba" "ab") 0 1) > 4 (str-find "a--a" "a" -1 'left) > 3
"""
