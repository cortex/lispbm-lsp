To clear a byte array the function bufclear can be used: (bufclear arr optByte optStart optLen) Where arr is the byte array to clear, optByte is the optional argument of what to clear with (default 0), optStart is the optional argument of which position to start clearing (default 0) and optLen is the optional argument of how many bytes to clear after start (default the entire array). Example: (bufclear arr) ; Clear all of arr (bufclear arr 0xFF) ; Fill arr with 0xFF (bufclear arr 0 5) ; Clear from index 5 to the end (bufclear arr 0 5 10) ; Clear 10 bytes starting from index 5 (bufclear arr 0xAA 5 10) ; Set 10 bytes to 0xAA starting from index 5
"""
    },
    {
        name = "bufget-x",
        comment = """
To read data from the byte array you can use (bufget-[x] arr index) Where [ x ] is i8, u8, i16, u16, i32, u32 or f32. Index is the position in the array to start reading from, starting at 0. Here are some examples (bufget-i8 arr 0) ; read byte 0 as int8 (bufget-i16 arr 0) ; read byte 0 and 1 as int16 (bufget-i32 arr 0) ; read byte 0 to 3 as i32 (bufget-u8 arr 0) ; read byte 0 as uint8 (bufget-u16 arr 0) ; read byte 0 and 1 as uint16 (bufget-u24 arr 0) ; read byte 0, 1 and 2 as uint24 (bufget-u32 arr 0) ; read byte 0 to 3 as uint32 (bufget-f32 arr 0) ; read byte 0 to 3 as float32 (IEEE 754) By default the byte order is big endian. The byte order can also be specified as an extra argument. E.g. to read 4 bytes as int32 from position 6 in little endian you can use (bufget-i32 arr 6 'little-endian)
"""
    },
    {
        name = "bufset-x",
        comment = """
Writing to the array can be done in a similar way (bufset-[x] arr index value) Here are some examples (bufset-i8 arr 0 12) ; write 12 to byte 0 as int8 (bufset-i16 arr 0 -5621) ; write -5621 to byte 0 and 1 as int16 (bufset-i32 arr 0 2441) ; write 2441 to byte 0 to 3 as i32 (bufset-u8 arr 0 12) ; write 12 to byte 0 as uint8 (bufset-u16 arr 0 420) ; write 420 to byte 0 and 1 as uint16 (bufset-u24 arr 0 420) ; write 420 to byte 0, 1 and 2 as uint24 (bufset-u32 arr 0 119) ; write 119 to byte 0 to 3 as uint32 (bufset-f32 arr 0 3.14) ; write 3.14 to byte 0 to 3 as float32 (IEEE 754) (bufset-bit arr 14 1) ; Set bit 14 to 1 (note that this is a bitindex) As with bufget big endian is the default byte order and little-endian can be passed as the last argument to use little-endian byte order instead.
