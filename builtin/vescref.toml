definitions = [
    {
        name = "print",
        comment = """
(print arg1 ... argN) Print to the VESC Tool Lisp console. Example: (print "Hello World") > "Hello World" Should work for all types. If multiple arguments are provided, each one will be printed on a separate line.
"""
    },
    {
        name = "puts",
        comment = """
(puts str) Similar to print , but only takes one string as an argument and prints it without quotes. The string extensions can be used to format the output. Note: This extension can print longer strings than print . print will trim any output over 256 bytes, while this extension only trims strings over 400 bytes. Example: (puts "Hello World") > Hello World
"""
    },
    {
        name = "set-print-prefix",
        comment = """
(set-print-prefix str) Adds a prefix to prints that are sent to the repl in VESC Tool. Useful when multiple devices print to the repl over CAN at the same time for determining which print comes from which device. The prefix can't be longer than 50 bytes (including the null byte), and str will be trimmed if longer. The value is remembered until the next power cycle. Note: This is applied to all text sent to the repl, not just text created by calling print or puts . Example: (set-print-prefix "dev-1| ") (puts "This message has\na clear origin!") which outputs dev-1| This message has dev-1| a clear origin!
"""
    },
    {
        name = "set-fw-name",
        comment = """
(set-fw-name str) Set (or override if already set in the firmware) firmware name. The firmware name is printed in the CAN-list in VESC Tool when it is set. It can also be used by packages to determine if they are compatible with the connected hardware.
"""
    },
    {
        name = "timeout-reset",
        comment = """
(timeout-reset) Reset the timeout that stops the motor. This has to be run on at least every second to keep the motor running. The timeout time can be configured in App Settings->General. The Motor Set Commands will also reset the timeout when they are called.
"""
    },
    {
        name = "get-ppm",
        comment = """
(get-ppm) Read the decoded value on the PPM input, range -1.0 to 1.0. If the PPM-decoder is not running it will be initialized and the PPM-pin will be reconfigured, so make sure that nothing else is using that pin. Example: (print (str-from-n (get-ppm) "PPM Value: %.2f")) Note that control type can be set to Off in the PPM app to get the input without running the motor automatically, which is useful when running the motor from lisp.
"""
    },
    {
        name = "get-ppm-age",
        comment = """
(get-ppm-age) Get the age of the last PPM update in seconds. Can be used to determine if there is any valid PPM-signal.
"""
    },
    {
        name = "set-servo",
        comment = """
(set-servo value) Set servo output to value. Range 0 to 1. Note that the servo output has to be enabled in App Settings -> General.
"""
    },
    {
        name = "get-vin",
        comment = """
(get-vin) Get input voltage.
"""
    },
    {
        name = "select-motor",
        comment = """
(select-motor motor) Select which motor to control on dual-motor hardware. Options are 1 for motor 1 and 2 for motor 2.
"""
    },
    {
        name = "get-selected-motor",
        comment = """
(get-selected-motor) Get currently selected motor on dual motor hardware.
"""
    },
    {
        name = "get-bms-val",
        comment = """
(get-bms-val val optValArg) Get value from BMS. Examples: (get-bms-val 'bms-v-tot) ; Total voltage (get-bms-val 'bms-v-charge) ; Charge input voltage (get-bms-val 'bms-i-in-ic) ; Measured current (negative means charging) (get-bms-val 'bms-ah-cnt) ; Amp hour counter (get-bms-val 'bms-wh-cnt) ; Watt hour counter (get-bms-val 'bms-cell-num) ; Number of cells in series (get-bms-val 'bms-v-cell 2) ; Cell 3 voltage (index starts from 0) (get-bms-val 'bms-bal-state 2) ; Cell 3 balancing state. 0: not balancing, 1: balancing (get-bms-val 'bms-temp-adc-num) ; Temperature sensor count (get-bms-val 'bms-temps-adc 2) ; Get sensor 3 temperature (index starts from 0) (get-bms-val 'bms-temp-ic) ; Balance IC temperature (get-bms-val 'bms-temp-hum) ; Humidity sensor temperature (get-bms-val 'bms-hum) ; Humidity (get-bms-val 'bms-pres) ; Pressure in PA (Added in 6.05) (get-bms-val 'bms-temp-cell-max) ; Maximum cell temperature (get-bms-val 'bms-v-cell-min) ; Minimum cell voltage (added in 6.06) (get-bms-val 'bms-v-cell-max) ; Maximum cell voltage (added in 6.06) (get-bms-val 'bms-soc) ; State of charge (0.0 to 1.0) (get-bms-val 'bms-soh) ; State of health (0.0 to 1.0) (get-bms-val 'bms-can-id) ; CAN ID of BMS (get-bms-val 'bms-ah-cnt-chg-total) ; Total ah charged (get-bms-val 'bms-wh-cnt-chg-total) ; Total wh charged (get-bms-val 'bms-ah-cnt-dis-total) ; Total ah discharged (get-bms-val 'bms-wh-cnt-dis-total) ; Total wh discharged (get-bms-val 'bms-msg-age) ; Age of last message from BMS in seconds (get-bms-val 'bms-chg-allowed) ; Charging allowed (Added in 6.05, Express only) (get-bms-val 'bms-data-version) ; Data version (added in 6.06) (get-bms-val 'bms-status) ; Status string (added in 6.06) Note In firmware 6.06 the following temperature sensor convention was introduced for bms-temps-adc. So when using (get-bms-val 'bms-temps-adc 2) the maximum cell temperature should be returned. If a temperature returns less than -280 degC that reading is not applicable on that BMS. Keep in mind that it will take some time before all BMSes follow this convention after the 6.06 release. (get-bms-val 'bms-data-version) should return 1 if this convention is used.
"""
    },
    {
        name = "set-bms-val",
        comment = """
(set-bms-val val optValArg new-value) This lets you set BMS-values so that VESC Tool and the BMS limits can see and use them. The same values as described in get-bms-val can be updated, but with an argument at the end with what the value should be set to. This is useful if you want to implement communication with a custom BMS and have it show up in VESC Tool. Example: (set-bms-val 'bms-cell-num 12) ; It is a 12s pack (set-bms-val 'bms-v-cell 2 3.92) ; Set cell 2 voltage to 3.92V
"""
    },
    {
        name = "send-bms-can",
        comment = """
(send-bms-can) Send BMS-values on CAN-bus. This his useful if a custom BMS-driver is implemented using set-bms-val in order to make devices on the CAN-bus aware of the BMS-state using the VESC protocol.
"""
    },
    {
        name = "set-bms-chg-allowed",
        comment = """
(set-bms-chg-allowed allow) Enable or disable charging. 1 means enable and 0 means disable.
"""
    },
    {
        name = "bms-force-balance",
        comment = """
(bms-force-balance balance) Start or stop balancing. 1 means start and 0 means stop.
"""
    },
    {
        name = "bms-zero-offset",
        comment = """
(bms-zero-offset) Zero current measurement offset on BMS. Has to be done while no current (or charge-current on charge-only BMS) is flowing. Will be sent to every BMS on the CAN-bus.
"""
    },
    {
        name = "bms-st",
        comment = """
(bms-st can-id) Run self-test on BMS with can-id. Returns the following list on success, otherwise timeout: ( 1 ; Balance IC OK 1 ; Balamce connection check OK 8 ; Cell num (8 Cells) (1 3.691400f32 3.561700f32) ; Cell 1 OK, V_BAL, V_NO_BAL (1 3.687200f32 3.367500f32) ; Cell 2 OK, V_BAL, V_NO_BAL (1 3.687500f32 3.377500f32) ; Cell 3 OK, V_BAL, V_NO_BAL (1 3.688900f32 3.389400f32) ; Cell 4 OK, V_BAL, V_NO_BAL (1 3.690100f32 3.401900f32) ; Cell 5 OK, V_BAL, V_NO_BAL (1 3.688800f32 3.413800f32) ; Cell 6 OK, V_BAL, V_NO_BAL (1 3.689000f32 3.424600f32) ; Cell 7 OK, V_BAL, V_NO_BAL (1 3.688900f32 3.433300f32) ; Cell 8 OK, V_BAL, V_NO_BAL )
"""
    },
    {
        name = "get-adc",
        comment = """
(get-adc ch) Get ADC voltage on channel ch (0, 1, 2 or 3). The channels are the following: Channel 0: ADC1 on the COMM-port Channel 1: ADC2 on the COMM-port Channel 2: ADC3 on the COMM-port. Note that some hardware does not have this channel - then the voltage of ADC1 is returned instead. Channel 3: This is the ADC-channel that the motor temperature sensor goes to. Note: if you want to use this channel for something else you have to disable the motor temperature sensor in General -> Advanced. Otherwise the input might generate overtemperature faults. Channel 4+: Some hardware has additional ADC-channels which also can be read with this function. If they are missing the voltage on ADC1 is returned instead. Channel 20 (FW6.06+): Sin/Cos encoder SIN channel Channel 21 (FW6.06+): Sin/Cos encoder COS channel
"""
    },
    {
        name = "override-temp-motor",
        comment = """
(override-temp-motor temp) Override motor temperature. This can be used to implement custom motor temperature sensors if the sensor you have is not supported. Note: Motor Temperature Sensor Type has to be set to Disabled in General -> Advanced for the override to work.
"""
    },
    {
        name = "get-adc-decoded",
        comment = """
(get-adc-decoded ch) Get decoded ADC value on channel ch (0 or 1). Decoded means that the voltage is mapped to the range 0 to 1 according to the configuration in the ADC app. Note that the ADC app must be running for this function to work. No throttle curve is applied to this value, but you can use the throttle-curve function to apply one if desired.
"""
    },
    {
        name = "systime",
        comment = """
(systime) Get system time in ticks since boot.
"""
    },
    {
        name = "secs-since",
        comment = """
(secs-since timestamp) Get seconds elapsed since systime timestamp.
"""
    },
    {
        name = "set-aux",
        comment = """
(set-aux ch state) Set AUX output ch (1 or 2) to state. Example: (set-aux 1 1) ; Set AUX1 to ON. Note: The AUX output mode must be set to Unused in Motor Settings->General->Advanced. Otherwise the firmware will change the AUX state directly after it is set using this function.
"""
    },
    {
        name = "get-imu-rpy",
        comment = """
(get-imu-rpy) Get roll, pitch and yaw from the IMU in radians. The function (ix list ind) can be used to get an element from the list. Example: (ix (get-imu-rpy) 0) ; Get roll (index 0)
"""
    },
    {
        name = "get-imu-quat",
        comment = """
(get-imu-quat) Get a list of quaternions from the IMU (q0, q1, q2 and q3).
"""
    },
    {
        name = "get-imu-acc",
        comment = """
(get-imu-acc) Get a list of the x, y and z acceleration from the IMU in G.
"""
    },
    {
        name = "get-imu-gyro",
        comment = """
(get-imu-gyro) Get a list of the x, y and z angular rate from the IMU in degrees/s.
"""
    },
    {
        name = "get-imu-mag",
        comment = """
(get-imu-mag) Get a list of the x, y and z magnetic field strength from the IMU in uT. Note that most IMUs do not have a magnetometer.
"""
    },
    {
        name = "get-imu-acc-derot",
        comment = """
Same as get-imu-acc, but derotates the result first. This means that the acceleration will be relative to the horizon and not the IMU chip.
"""
    },
    {
        name = "get-imu-gyro-derot",
        comment = """
Same as get-imu-gyro, but derotates the result first. This means that the angular rates will be relative to the horizon and not the IMU chip.
"""
    },
    {
        name = "send-data",
        comment = """
(send-data dataList optInterface optCanId) Send a list of custom app data on the commands-interface of the type COMM_CUSTOM_APP_DATA. This can be read from a Qml script in VESC Tool for example or from another node on the CAN-bus. Example of sending the numbers 1, 2, 3 and 4: (send-data (list 1 2 3 4)) dataList can be a list or a byte array . The optional argument optInterface (introduced in FW 6.05) can be used to specify which interface to use and the optional argument optCanId can be used to specify which CAN-device to send the message to when using the CAN interface. The available interfaces are:
"""
    },
    {
        name = "recv-data",
        comment = """
(recv-data optTimeout) Block current thread until data from VESC Tool arrives. The optional argument optTimeout can be used to specify a timeout in seconds. If a timeout occurs the symbol timeout will be returned, otherwise a byte array with the data will arrive. Usage example: (print (recv-data)) > [1 2 3]
"""
    },
    {
        name = "sleep",
        comment = """
(sleep seconds) Sleep for seconds seconds. Example: (sleep 0.05) ; Sleep for 0.05 seconds (50 ms)
"""
    },
    {
        name = "get-remote-state",
        comment = """
(get-remote-state) Get button and joystick state of connected remote. Note that a remote app such as the VESC remote or nunchuk must be configured and running for this to work. Returns the following list: (js-y js-x bt-c bt-z is-rev update-age) ; Where ; js-y : Joystick Y axis, range -1.0 to 1.0 ; js-x : Joystick X axis, range -1.0 to 1.0 ; bt-c : C button pressed state, 0 or 1 ; bt-z : Z button pressed state, 0 or 1 ; is-rev : Reverse active, 0 or 1 ; update-age : Age of last update from the remote in seconds
"""
    },
    {
        name = "sysinfo",
        comment = """
(sysinfo param) Read system info parameter param. Example: (sysinfo 'hw-name) ; Hardware name, e.g 60 (sysinfo 'fw-ver) ; Firmware version as list (Major Minor BetaNum) (sysinfo 'has-phase-filters) ; t if hardware has phase filters. ESC only. (sysinfo 'uuid) ; STM32 UUID. ESC only. (sysinfo 'runtime) ; Total runtime in seconds. ESC only. (sysinfo 'odometer) ; Total odometer in meters. ESC only. Added in 6.06. (sysinfo 'git-branch) ; Git branch name. (sysinfo 'git-hash) ; Git hash of current commit. (sysinfo 'compiler) ; GCC version, e.g. 7.3.1. ESC only. (sysinfo 'hw-type) ; Hardware type, e.g. hw-express. Added in 6.02. (sysinfo 'part-running) ; Running partition name. Express only. (sysinfo 'cpu-freq) ; CPU frequency in MHz. Express only.
"""
    },
    {
        name = "stats",
        comment = """
(stats param) Get statistics about the selected motor since boot (or since stats-reset). The following example shows which stats are available: (stats 'stat-speed-avg) ; Average speed in m/s (stats 'stat-speed-max) ; Maximum speed in m/s (stats 'stat-power-avg) ; Average power in W (stats 'stat-power-max) ; Maximum power in W (stats 'stat-current-avg) ; Average current in A (stats 'stat-current-max) ; Maximum current in A (stats 'stat-temp-mosfet-avg) ; Average MOSFET temp in degC (stats 'stat-temp-mosfet-max) ; Maximum MOSFET temp in degC (stats 'stat-temp-motor-avg) ; Average motor temp in degC (stats 'stat-temp-motor-max) ; Maximum motor temp in degC (stats 'stat-count-time) ; Time since start of stat collection in seconds
"""
    },
    {
        name = "set-odometer",
        comment = """
(set-odometer meters) Set persistent odometer counter to meters.
"""
    },
    {
        name = "stats-reset",
        comment = """
(stats-reset) Reset stat counters to 0.
"""
    },
    {
        name = "crc16",
        comment = """
(crc16 array optLen) Calculate the 16-bit crc of array. optLen is an optional argument for how many elements to include, if it is left out the entire array will be used. The crc uses the polynomial 0x11021 and initial value 0, which is the same as the VESC packets use. Added in FW 6.02.
"""
    },
    {
        name = "crc32",
        comment = """
(crc32 array init optLen) Calculate the 32-bit crc of array. optLen is an optional argument for how many elements to include, if it is left out the entire array will be used. The crc uses the polynomial 0x4C11DB7 (ethernet) and initial value init.
"""
    },
    {
        name = "main-init-done",
        comment = """
(main-init-done) Returns true when the main-function is done with all initialization.
"""
    },
    {
        name = "shutdown-hold",
        comment = """
(shutdown-hold hold) Hold shutdown. When hold is true hardware shutdown will be delayed until hold is set to false again. Can be used when catching a shutdown-event if more time is needed for cleanup.
"""
    },
    {
        name = "reboot",
        comment = """
(reboot) Reboot CPU. Required on the express when e.g. changing wifi-settings.
"""
    },
    {
        name = "override-speed",
        comment = """
(overide-speed ovr speed) Override speed reported to VESC Tool (and to other extensions). The argument speed is the speed to override with in meters per second and the argument ovr is set to 1 for overriding the speed and to 0 for reporting the speed as before. Example: ; Override speed with 3.6 km/h (overide-speed 1 (/ 12.0 3.6)) ; Do not override speed anymore (overide-speed 0 0)
"""
    },
    {
        name = "app-adc-detach",
        comment = """
(app-adc-detach mode state) ; Where ; mode : Select periperial to detach from APP ; - 0 All peripherial attached (no second argument) ; - 1 ADC1/2 ; - 2 Buttons ; - 3 ADC1/2 + Buttons ; state : Only used when mode is not 0. State 1, 2 or 3 detaches the peripheral and ; state 0 attaches peripheral. For the ADC, 1 means detach both ADCs, 2 means ; detach ADC1 only and 3 means detach ADC2 only. For the buttons state ; 1, 2 and 3 mean the same thing, namely detach. Detaches a peripherial from the APP ADC Note: Since firmware 6.05 the ADC-app will no longer reset the timeout by itself when detached. That means that the override-commands have to be sent at a rate higher than the timeout for the output to stay enabled. This is a safety feature that prevents the motor from running after the timeout time if e.g. your script crashes.
"""
    },
    {
        name = "app-adc-override",
        comment = """
(app-adc-override mode value) ; Where ; mode : Select peripheral to override ; - 0 ADC1 ; - 1 ADC2 ; - 2 Reverse button ; - 3 Cruise control button ; value : 0.0 to 3.3 (button pressed is > 0.0) ; Note that throttle mapping also is applied to the override value. Sets the override value
"""
    },
    {
        name = "app-adc-range-ok",
        comment = """
(app-adc-range-ok) Returns true when the throttle voltage is within range and false (nil) otherwise.
"""
    },
    {
        name = "app-ppm-detach",
        comment = """
(app-ppm-detach state) Detaches the decoded ppm signal from APP PPM. 1 means detach, 0 means attach.
"""
    },
    {
        name = "app-ppm-override",
        comment = """
(app-ppm-override value) Sets the override value. Range -1.0 to 1.0.
"""
    },
    {
        name = "set-remote-state",
        comment = """
(set-remote-state js-y js-x bt-c bt-z is-rev) ; Where ; js-y : Joystick Y axis, range -1.0 to 1.0, used for throttle position ; js-x : Joystick X axis, range -1.0 to 1.0, unused by the app ; bt-c : C button pressed state, 0 or 1, used for cruise control ; bt-z : Z button pressed state, 0 or 1, unused by the app ; is-rev : Reverse active, 0 or 1, reverse mode active Send input to the VESC Remote app. Unlike the ADC and PPM apps, input can be sent to this app at any time without detaching it and it will be treated the same as a packet from a VESC Remote. That means the timeout as well as all VESC Remote settings will be used.
"""
    },
    {
        name = "app-disable-output",
        comment = """
(app-disable-output ms) Disable app output for ms milliseconds. 0 means enable now and -1 means disable forever. This can be used to override the control of apps temporarily.
"""
    },
    {
        name = "app-is-output-disabled",
        comment = """
(app-is-output-disabled) Check if app output is disabled. VESC Tool will disable app output during some detection routines, so when running a custom control script it might be useful to check this and disable the output when this value is true.
"""
    },
    {
        name = "app-pas-get-rpm",
        comment = """
(app-pas-get-rpm) Returns the pedal RPM measured by the PAS-app. If you want to implement your own PAS-control based on this RPM you can use app-disable-output to disable the output of the PAS-app.
"""
    },
    {
        name = "set-current",
        comment = """
(set-current current optOffDelay) Set motor current in amperes. The optional optOffDelay argument (in seconds) will delay turning off the modulation when setting 0 current. This is useful when running e.g. a control loop that will end up setting 0 current in some circumstances when turning off the modulation would make the control less smooth. The delay value should be longer than the rate at which the control loop runs.
"""
    },
    {
        name = "set-current-rel",
        comment = """
(set-current-rel current optOffDelay) Set motor current relative to the maximum current. Range -1 to 1. For example, if the maximum current is set to 50A, (set-current-rel 0.5) will set the current to 25A. See set-current for details on what the optional argument optOffDelay does.
"""
    },
    {
        name = "set-duty",
        comment = """
(set-duty dutycycle) Set duty cycle. Range -1.0 to 1.0.
"""
    },
    {
        name = "set-brake",
        comment = """
(set-brake current) Set braking current.
"""
    },
    {
        name = "set-brake-rel",
        comment = """
(set-brake-rel current) Set braking current relative to the maximum current, range 0.0 to 1.0.
"""
    },
    {
        name = "set-handbrake",
        comment = """
(set-handbrake current) Set handbrake current. This sets an open loop current that allows to hold the motor still even at 0 speed at the cost of efficient.
"""
    },
    {
        name = "set-handbrake-rel",
        comment = """
(set-handbrake-rel current) Same as set-handbrake, but with a current relative to the maximum current in the range 0.0 to 1.0.
"""
    },
    {
        name = "set-rpm",
        comment = """
(set-rpm rpm) Set RPM speed control.
"""
    },
    {
        name = "set-pos",
        comment = """
(set-pos pos) Position control. Set motor position in degrees, range 0.0 to 360.0.
"""
    },
    {
        name = "foc-openloop",
        comment = """
(foc-openloop current rpm) Run FOC in open loop. Useful to test thermal properties of motors and power stages.
"""
    },
    {
        name = "foc-openloop-phase",
        comment = """
(foc-openloop-phase current phase) Run FOC in open loop in phase mode. Phase is the electrical position of the openloop-vector in degrees, range 0.0 to 360.0.
"""
    },
    {
        name = "set-kill-sw",
        comment = """
(set-kill-sw state) Set kill switch state. When state is set to 1 the motor is disabled and optionally braking if timeout_brake_current is greater than 0. The kill switch overrides all other inputs and can be used as an emergency stop. The kill switch state here is applied as logic OR with the app settings kill switch input, so as long as any of them is active the motor will be disabled.
"""
    },
    {
        name = "foc-beep",
        comment = """
(foc-beep freq time voltage) Use the motor to play a beep sound at frequency freq for time seconds using voltage excitation voltage. The frequency can be set between 100 Hz and 7500 Hz.
"""
    },
    {
        name = "foc-play-tone",
        comment = """
(foc-play-tone channel freq voltage) Use the motor to play a tone at frequency freq with modulation voltage. Channel can be 0, 1, 2 or 3 and all channels can play tones simultaneously (polyphonic audio). Unlike foc-beep, foc-play-tone also works while the motor is running.
"""
    },
    {
        name = "foc-play-samples",
        comment = """
(foc-play-samples samples freq voltage) Use the motor to play sampled audio. Works while the motor is running. Samples is a byte-array with samples, where each sample has the range -128 to 127. Freq is the sampling frequency and voltage is the voltage amplitude the samples will be played at. The caller is responsible for making sure that the sample buffer stays valid until it is consumed. Internally this function has two buffers and when both buffers are full the function will block until a buffer is free. For smooth playback, it is important to keep feeding this function with buffers faster than it consumes the samples.
"""
    },
    {
        name = "foc-play-stop",
        comment = """
(foc-play-stop) Stop playing tones on all channels.
"""
    },
    {
        name = "get-current",
        comment = """
(get-current optFilter) Get motor current. Positive means that current is flowing into the motor and negative means that current is flowing out of the motor (regenerative braking).
"""
    },
    {
        name = "get-current-dir",
        comment = """
(get-current-dir) Get directional current. Positive for torque in the forward direction and negative for torque in the reverse direction.
"""
    },
    {
        name = "get-current-in",
        comment = """
(get-current-in optFilter)
"""
    },
    {
        name = "get-id",
        comment = """
(get-id optFilter) Get FOC d-axis current.
"""
    },
    {
        name = "get-iq",
        comment = """
(get-iq optFilter) Get FOC q-axis current.
"""
    },
    {
        name = "get-id-set",
        comment = """
(get-id-set) Get the set FOC d-axis current. This is the raw requested current.
"""
    },
    {
        name = "get-iq-set",
        comment = """
(get-iq-set) Get the set FOC q-axis current. This is the raw requested current.
"""
    },
    {
        name = "get-id-target",
        comment = """
(get-id-target) Get the FOC d-axis target current. This is sent to the current controller after applying all limits, MTPA, HFI and field weakening.
"""
    },
    {
        name = "get-iq-target",
        comment = """
(get-iq-target) Get the FOC q-axis target current. This is sent to the current controller after applying all limits, MTPA, HFI and field weakening.
"""
    },
    {
        name = "get-vd",
        comment = """
(get-vd optFilter) Get FOC d-axis voltage.
"""
    },
    {
        name = "get-vq",
        comment = """
(get-vq optFilter) Get FOC q-axis voltage.
"""
    },
    {
