Byte arrays will be de-allocated by the garbage collector on a regular basis, but can still use a lot of memory until then and large byte arrays cause a risk of running out of memory. It is possible to manually de-allocate the byte arrays when done with them by calling free (free arr) This will clear the allocated memory for arr . Note: Strings in lispBM are treated the same as byte arrays, so all of the above can be done to the characters in strings too.
